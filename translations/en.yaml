configuration:
  auth_token:
    name: Auth Token
    description: Anthropic auth token (for enterprise/proxy setups)
  base_url:
    name: Base URL
    description: Custom API base URL (for enterprise proxy, e.g. https://models.yourcompany.io/claude)
  model:
    name: Model
    description: Claude model to use (e.g. 'sonnet', or full ID for enterprise)
  pexels_api_key:
    name: Pexels API Key
    description: Free API key from pexels.com for recipe images (optional, get one at pexels.com/api)
  skills:
    name: Skills
    description: Configure Claude skills and their schedules
