name: "Claude Skills Runner"
description: "Run Claude Code skills (madplan, etc.) on schedule or on-demand, with a web UI to view results"
version: "0.4.0"
slug: "claude_skills_runner"
url: "https://github.com/tobydiamonds/ha-claude-skills"
arch:
  - amd64
  - aarch64
init: false
startup: "application"
boot: "auto"
ingress: true
ingress_port: 8099
panel_icon: "mdi:robot"
panel_title: "Claude Skills"
map:
  - share:rw
  - addon_config:rw
options:
  api_key: ""
  auth_token: ""
  base_url: ""
  model: "claude-sonnet-4-6"
  skills: []
  log_level: "info"
schema:
  api_key: str?
  auth_token: str?
  base_url: str?
  model: str?
  skills:
    - name: str
      prompt: str
      schedule: str?
  log_level: list(debug|info|warning|error)
environment:
  CLAUDE_CONFIG_DIR: /data/claude
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "Web UI (use ingress instead)"
