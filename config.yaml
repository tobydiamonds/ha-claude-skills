name: "Claude Skills Runner"
description: "Run Claude Code skills (madplan, etc.) on schedule or on-demand, with a web UI to view results"
version: "0.7.9"
slug: "claude_skills_runner"
url: "https://github.com/tobydiamonds/ha-claude-skills"
arch:
  - amd64
  - aarch64
init: false
startup: "application"
boot: "auto"
ingress: true
ingress_port: 8099
panel_icon: "mdi:food"
panel_title: "Madplaner"
panel_admin: false
map:
  - share:rw
  - addon_config:rw
options:
  api_key: ""
  model: "sonnet"
  pexels_api_key: ""
  skills: []
schema:
  api_key: str?
  model: str?
  pexels_api_key: str?
  skills:
    - name: str
      prompt: str
      schedule: str?
environment:
  CLAUDE_CONFIG_DIR: /data/claude
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "Web UI (use ingress instead)"
