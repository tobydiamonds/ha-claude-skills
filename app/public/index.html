<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madplaner</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #fff;
      --accent: #e94560;
      --accent-light: #fff0f3;
      --text: #222;
      --text-dim: #666;
      --border: #eee;
      --success: #4ecdc4;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: var(--surface);
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.4; }
    .btn.back {
      background: none;
      color: var(--accent);
      padding: 0.5rem 0;
      font-size: 1rem;
    }

    /* List */
    .list-view { padding: 0.5rem; }
    .plan-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin: 0.5rem;
      box-shadow: var(--shadow);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .plan-card:active { transform: scale(0.98); }
    .plan-card-title { font-weight: 600; }
    .plan-card-meta { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.15rem; }
    .plan-card-arrow { color: #ccc; font-size: 1.4rem; }

    /* Detail */
    .detail-view { display: none; }
    .detail-view.active { display: block; }
    .list-view.hidden { display: none; }

    /* Tabs */
    .tab-bar {
      display: flex;
      overflow-x: auto;
      gap: 0.3rem;
      padding: 0.6rem 0.8rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 49px;
      z-index: 99;
      -webkit-overflow-scrolling: touch;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 0.35rem 0.7rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Content */
    .plan-content {
      padding: 1rem 1.2rem 4rem;
      line-height: 1.7;
    }
    .plan-content h1 { font-size: 1.3rem; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 0.3em; margin-bottom: 0.5rem; }
    .plan-content h2 { font-size: 1.1rem; color: #16213e; margin-top: 1.5rem; margin-bottom: 0.4rem; }
    .plan-content h3 { font-size: 0.95rem; color: #0f3460; margin-top: 1rem; margin-bottom: 0.3rem; }
    .plan-content ul, .plan-content ol { padding-left: 1.2rem; margin: 0.4rem 0; }
    .plan-content li { margin: 0.25rem 0; }
    .plan-content p { margin: 0.4rem 0; }
    .plan-content strong { color: var(--accent); }
    .plan-content img { max-width: 100%; border-radius: 8px; margin: 0.5rem 0; }
    .plan-content hr { border: none; border-top: 1px solid var(--border); margin: 1.2rem 0; }

    /* Shopping list checkboxes */
    .shopping-item {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #f5f5f5;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .shopping-item:last-child { border-bottom: none; }
    .shopping-item.checked .shopping-text {
      text-decoration: line-through;
      color: var(--text-dim);
    }
    .shopping-check {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border: 2px solid #ccc;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      margin-top: 1px;
    }
    .shopping-item.checked .shopping-check {
      background: var(--success);
      border-color: var(--success);
    }
    .shopping-item.checked .shopping-check::after {
      content: '✓';
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .shopping-text { font-size: 0.95rem; line-height: 1.4; padding-top: 2px; }
    .shopping-category { font-weight: 700; font-size: 0.9rem; color: #0f3460; margin-top: 1.2rem; margin-bottom: 0.3rem; }
    .shopping-progress {
      background: var(--surface);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      box-shadow: var(--shadow);
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--success);
      border-radius: 3px;
      transition: width 0.3s;
    }
    .progress-text { font-size: 0.8rem; color: var(--text-dim); white-space: nowrap; }

    /* Running */
    .running-banner {
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 1rem;
      margin: 0.8rem;
      display: none;
      align-items: center;
      gap: 0.8rem;
    }
    .running-banner.active { display: flex; }
    .spinner { width: 20px; height: 20px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
    .empty-state h2 { color: var(--text); margin-bottom: 0.5rem; }
  </style>
</head>
<body>

  <!-- List View -->
  <div class="list-view" id="listView">
    <div class="header">
      <h1>Madplaner</h1>
      <button class="btn" id="btnGenerate" onclick="generate()">+ Ny</button>
    </div>
    <div class="running-banner" id="runningBanner">
      <div class="spinner"></div>
      <span style="font-size:0.85rem;font-weight:500">Genererer madplan...</span>
    </div>
    <div id="planList"></div>
  </div>

  <!-- Detail View -->
  <div class="detail-view" id="detailView">
    <div class="header">
      <button class="btn back" onclick="showList()">← Tilbage</button>
      <span id="detailTitle" style="font-weight:600;font-size:0.9rem"></span>
    </div>
    <div class="tab-bar" id="tabBar"></div>
    <div class="plan-content" id="planContent"></div>
  </div>

  <script>
    let ws, plans = [], currentPlanId = null, currentSections = [], checkedItems = [];

    const BASE = () => location.pathname.replace(/\/$/, '');

    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}${BASE()}/ws`);
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'started') showRunning(true);
        if (msg.type === 'completed') { showRunning(false); loadPlans(); }
      };
      ws.onclose = () => setTimeout(connectWS, 3000);
    }

    function showRunning(on) {
      document.getElementById('runningBanner').classList.toggle('active', on);
      document.getElementById('btnGenerate').disabled = on;
    }

    async function loadPlans() {
      const res = await fetch(`${BASE()}/api/madplaner`);
      plans = await res.json();
      renderList();
    }

    function renderList() {
      const el = document.getElementById('planList');
      if (!plans.length) {
        el.innerHTML = '<div class="empty-state"><h2>Ingen madplaner</h2><p>Tryk "+ Ny" for at generere.</p></div>';
        return;
      }
      el.innerHTML = plans.map(p => `
        <div class="plan-card" onclick="showPlan('${p.id}')">
          <div>
            <div class="plan-card-title">Uge ${p.week || '?'}, ${p.year || ''}</div>
            <div class="plan-card-meta">${fmtDate(p.createdAt)}</div>
          </div>
          <span class="plan-card-arrow">›</span>
        </div>`).join('');
    }

    async function showPlan(id) {
      currentPlanId = id;
      const res = await fetch(`${BASE()}/api/madplaner/${id}`);
      const data = await res.json();
      checkedItems = data.checked || [];

      document.getElementById('listView').classList.add('hidden');
      document.getElementById('detailView').classList.add('active');

      const plan = plans.find(p => p.id === id);
      document.getElementById('detailTitle').textContent = plan ? `Uge ${plan.week}` : '';

      const container = document.createElement('div');
      container.innerHTML = data.html;
      currentSections = parseSections(container);
      renderTabs();
      showSection(0);
    }

    function parseSections(container) {
      const sections = [];
      let current = { title: 'Overblik', content: '', isShoppingList: false };

      for (const node of container.childNodes) {
        if (node.tagName === 'H2' || (node.tagName === 'H1' && sections.length > 0)) {
          if (current.content || current.title !== 'Overblik') sections.push(current);
          const title = node.textContent.trim();
          current = { title, content: '', isShoppingList: title.toLowerCase().includes('indkøb') };
        } else {
          current.content += node.outerHTML || '';
        }
      }
      if (current.content || current.title !== 'Overblik') sections.push(current);
      return sections;
    }

    function renderTabs() {
      const bar = document.getElementById('tabBar');
      bar.innerHTML = currentSections.map((s, i) => {
        let label = s.title;
        if (label.includes('Mandag')) label = 'Man';
        else if (label.includes('Tirsdag')) label = 'Tir';
        else if (label.includes('Onsdag')) label = 'Ons';
        else if (label.includes('Torsdag')) label = 'Tor';
        else if (label.includes('Fredag')) label = 'Fre';
        else if (label.toLowerCase().includes('indkøb')) label = '🛒 Indkøb';
        else if (label.length > 10) label = label.slice(0, 10) + '…';
        return `<span class="tab ${i === 0 ? 'active' : ''}" onclick="showSection(${i})">${label}</span>`;
      }).join('');
    }

    function showSection(idx) {
      const section = currentSections[idx];
      const el = document.getElementById('planContent');

      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));

      if (section.isShoppingList) {
        el.innerHTML = renderShoppingList(section);
        updateProgress();
      } else {
        el.innerHTML = `<h2>${section.title}</h2>${section.content}`;
      }
      el.scrollTop = 0;
    }

    function renderShoppingList(section) {
      // Parse the HTML content into categories and items
      const tmp = document.createElement('div');
      tmp.innerHTML = section.content;

      let html = '<div class="shopping-progress"><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><span class="progress-text" id="progressText">0/0</span></div>';

      let itemIndex = 0;
      for (const node of tmp.childNodes) {
        if (node.tagName === 'H3') {
          html += `<div class="shopping-category">${node.textContent}</div>`;
        } else if (node.tagName === 'UL') {
          for (const li of node.querySelectorAll('li')) {
            const isChecked = checkedItems.includes(itemIndex);
            html += `<div class="shopping-item ${isChecked ? 'checked' : ''}" onclick="toggleItem(${itemIndex}, this)">
              <div class="shopping-check"></div>
              <span class="shopping-text">${li.innerHTML}</span>
            </div>`;
            itemIndex++;
          }
        }
      }
      return html;
    }

    function toggleItem(index, el) {
      const isChecked = checkedItems.includes(index);
      if (isChecked) {
        checkedItems = checkedItems.filter(i => i !== index);
        el.classList.remove('checked');
      } else {
        checkedItems.push(index);
        el.classList.add('checked');
      }
      updateProgress();
      saveChecked();
    }

    function updateProgress() {
      const total = document.querySelectorAll('.shopping-item').length;
      const done = checkedItems.length;
      const fill = document.getElementById('progressFill');
      const text = document.getElementById('progressText');
      if (fill && text) {
        fill.style.width = total ? `${(done / total) * 100}%` : '0%';
        text.textContent = `${done}/${total}`;
      }
    }

    async function saveChecked() {
      await fetch(`${BASE()}/api/madplaner/${currentPlanId}/checked`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ checked: checkedItems }),
      });
    }

    function showList() {
      document.getElementById('listView').classList.remove('hidden');
      document.getElementById('detailView').classList.remove('active');
      currentPlanId = null;
    }

    async function generate() {
      await fetch(`${BASE()}/api/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ skill: 'madplan', triggeredBy: 'manual' }),
      });
    }

    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString('da-DK', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    async function checkStatus() {
      const res = await fetch(`${BASE()}/api/status`);
      const { running } = await res.json();
      showRunning(running);
    }

    connectWS();
    loadPlans();
    checkStatus();
  </script>
</body>
</html>
