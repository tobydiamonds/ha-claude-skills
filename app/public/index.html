<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madplaner</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #fff;
      --accent: #e94560;
      --accent-light: #fff0f3;
      --text: #222;
      --text-dim: #666;
      --border: #eee;
      --success: #4ecdc4;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      background: var(--surface);
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; }
    .header-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .header-btn:active { opacity: 0.7; }
    .header-btn:disabled { opacity: 0.5; }
    .header-btn.back {
      background: none;
      color: var(--accent);
      padding: 0.5rem 0;
      font-size: 1rem;
    }

    /* List view */
    .list-view { padding: 1rem; }
    .plan-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .plan-card:active { transform: scale(0.98); }
    .plan-card-title { font-weight: 600; font-size: 1rem; }
    .plan-card-meta { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.2rem; }
    .plan-card-arrow { color: var(--text-dim); font-size: 1.2rem; }

    /* Detail view */
    .detail-view { display: none; }
    .detail-view.active { display: block; }
    .list-view.hidden { display: none; }

    .plan-content {
      padding: 1rem 1.2rem 3rem;
      line-height: 1.7;
    }
    .plan-content h1 {
      font-size: 1.4rem;
      color: var(--accent);
      margin-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 0.4rem;
    }
    .plan-content h2 {
      font-size: 1.15rem;
      color: #16213e;
      margin-top: 1.8rem;
      margin-bottom: 0.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .plan-content h3 {
      font-size: 1rem;
      color: #0f3460;
      margin-top: 1rem;
      margin-bottom: 0.3rem;
    }
    .plan-content ul, .plan-content ol { padding-left: 1.3rem; margin: 0.5rem 0; }
    .plan-content li { margin: 0.3rem 0; }
    .plan-content p { margin: 0.5rem 0; }
    .plan-content strong { color: var(--accent); }
    .plan-content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 0.8rem 0;
    }
    .plan-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* Tab bar for switching between days and shopping list */
    .tab-bar {
      display: flex;
      overflow-x: auto;
      gap: 0.4rem;
      padding: 0.8rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 52px;
      z-index: 99;
      -webkit-overflow-scrolling: touch;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Running indicator */
    .running-banner {
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 1rem;
      margin: 1rem;
      display: none;
      align-items: center;
      gap: 0.8rem;
    }
    .running-banner.active { display: flex; }
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .running-text { font-size: 0.85rem; font-weight: 500; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-dim);
    }
    .empty-state h2 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }

    /* PDF link */
    .pdf-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent-light);
      color: var(--accent);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>

  <!-- List View -->
  <div class="list-view" id="listView">
    <div class="header">
      <h1>Madplaner</h1>
      <button class="header-btn" id="btnGenerate" onclick="generate()">+ Ny madplan</button>
    </div>

    <div class="running-banner" id="runningBanner">
      <div class="spinner"></div>
      <span class="running-text">Genererer madplan...</span>
    </div>

    <div id="planList"></div>
  </div>

  <!-- Detail View -->
  <div class="detail-view" id="detailView">
    <div class="header">
      <button class="header-btn back" onclick="showList()">← Tilbage</button>
      <a class="header-btn" id="pdfBtn" href="#" target="_blank" style="display:none;text-decoration:none">PDF</a>
    </div>
    <div class="tab-bar" id="tabBar"></div>
    <div class="plan-content" id="planContent"></div>
  </div>

  <script>
    let ws;
    let plans = [];
    let currentSections = [];

    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const base = location.pathname.replace(/\/$/, '');
      ws = new WebSocket(`${proto}//${location.host}${base}/ws`);
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'started') showRunning(true);
        if (msg.type === 'completed') { showRunning(false); loadPlans(); }
      };
      ws.onclose = () => setTimeout(connectWS, 3000);
    }

    function showRunning(active) {
      document.getElementById('runningBanner').classList.toggle('active', active);
      document.getElementById('btnGenerate').disabled = active;
    }

    async function loadPlans() {
      const base = location.pathname.replace(/\/$/, '');
      const res = await fetch(`${base}/api/madplaner`);
      plans = await res.json();
      renderList();
    }

    function renderList() {
      const list = document.getElementById('planList');
      if (plans.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <h2>Ingen madplaner endnu</h2>
            <p>Tryk "+ Ny madplan" for at generere den første.</p>
          </div>`;
        return;
      }
      list.innerHTML = plans.map(p => `
        <div class="plan-card" onclick="showPlan('${p.id}')">
          <div>
            <div class="plan-card-title">Uge ${p.week || '?'}, ${p.year || ''}</div>
            <div class="plan-card-meta">${formatDate(p.createdAt)}</div>
          </div>
          <span class="plan-card-arrow">›</span>
        </div>
      `).join('');
    }

    async function showPlan(id) {
      const base = location.pathname.replace(/\/$/, '');
      const res = await fetch(`${base}/api/madplaner/${id}`);
      const data = await res.json();

      document.getElementById('listView').classList.add('hidden');
      document.getElementById('detailView').classList.add('active');

      // PDF button
      const plan = plans.find(p => p.id === id);
      const pdfBtn = document.getElementById('pdfBtn');
      if (plan && plan.hasPdf) {
        pdfBtn.href = `${base}/pdf/${id}.pdf`;
        pdfBtn.style.display = 'inline-block';
      } else {
        pdfBtn.style.display = 'none';
      }

      // Parse sections from HTML
      const container = document.createElement('div');
      container.innerHTML = data.html;
      currentSections = parseSections(container);
      renderTabs();
      showSection(0);
    }

    function parseSections(container) {
      const sections = [];
      let current = { title: 'Overblik', content: '' };

      for (const node of container.childNodes) {
        if (node.tagName === 'H2') {
          if (current.content || current.title) sections.push(current);
          current = { title: node.textContent.trim(), content: '' };
        } else if (node.tagName === 'H1' && sections.length > 0) {
          if (current.content || current.title) sections.push(current);
          current = { title: node.textContent.trim(), content: '' };
        } else {
          current.content += node.outerHTML || '';
        }
      }
      if (current.content || current.title) sections.push(current);
      return sections;
    }

    function renderTabs() {
      const bar = document.getElementById('tabBar');
      bar.innerHTML = currentSections.map((s, i) => {
        let label = s.title;
        if (label.includes('Mandag')) label = 'Man';
        else if (label.includes('Tirsdag')) label = 'Tir';
        else if (label.includes('Onsdag')) label = 'Ons';
        else if (label.includes('Torsdag')) label = 'Tor';
        else if (label.includes('Fredag')) label = 'Fre';
        else if (label.includes('Indkøb')) label = 'Indkøb';
        else if (label.length > 12) label = label.slice(0, 12) + '…';
        return `<span class="tab ${i === 0 ? 'active' : ''}" onclick="showSection(${i})">${label}</span>`;
      }).join('');
    }

    function showSection(idx) {
      const section = currentSections[idx];
      const content = document.getElementById('planContent');
      content.innerHTML = `<h2>${section.title}</h2>${section.content}`;
      content.scrollTop = 0;

      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', i === idx);
      });
    }

    function showList() {
      document.getElementById('listView').classList.remove('hidden');
      document.getElementById('detailView').classList.remove('active');
    }

    async function generate() {
      const base = location.pathname.replace(/\/$/, '');
      await fetch(`${base}/api/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ skill: 'madplan', triggeredBy: 'manual' }),
      });
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('da-DK', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
    }

    // Status check
    async function checkStatus() {
      const base = location.pathname.replace(/\/$/, '');
      const res = await fetch(`${base}/api/status`);
      const { running } = await res.json();
      showRunning(running);
    }

    connectWS();
    loadPlans();
    checkStatus();
  </script>
</body>
</html>
