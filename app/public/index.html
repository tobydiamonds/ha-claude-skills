<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madplaner</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #fff;
      --accent: #e94560;
      --accent-light: #fff0f3;
      --text: #222;
      --text-dim: #666;
      --border: #eee;
      --success: #4ecdc4;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --star: #ffc107;
      --star-empty: #ddd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      background: var(--surface);
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .header h1 { font-size: 1.2rem; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 0.6rem; }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.4; }
    .btn.back {
      background: none;
      color: var(--accent);
      padding: 0.5rem 0;
      font-size: 1rem;
    }
    .btn.secondary {
      background: #16213e;
    }
    .btn.small {
      padding: 0.35rem 0.7rem;
      font-size: 0.8rem;
      border-radius: 6px;
    }

    /* User label */
    .user-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.3rem 0.7rem;
    }

    /* List */
    .list-view { padding: 0.5rem; }
    .plan-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin: 0.5rem;
      box-shadow: var(--shadow);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .plan-card:active { transform: scale(0.98); }
    .plan-card-title { font-weight: 600; }
    .plan-card-meta { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.15rem; }
    .plan-card-arrow { color: #ccc; font-size: 1.4rem; }

    /* Detail */
    .detail-view { display: none; }
    .detail-view.active { display: block; }
    .list-view.hidden { display: none; }

    /* Tabs */
    .tab-bar {
      display: flex;
      overflow-x: auto;
      gap: 0.3rem;
      padding: 0.6rem 0.8rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 49px;
      z-index: 99;
      -webkit-overflow-scrolling: touch;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 0.35rem 0.7rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Content */
    .plan-content {
      padding: 1rem 1.2rem 4rem;
      line-height: 1.7;
    }
    .plan-content h1 { font-size: 1.3rem; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 0.3em; margin-bottom: 0.5rem; }
    .plan-content h2 { font-size: 1.1rem; color: #16213e; margin-top: 1.5rem; margin-bottom: 0.4rem; }
    .plan-content h3 { font-size: 0.95rem; color: #0f3460; margin-top: 1rem; margin-bottom: 0.3rem; }
    .plan-content ul, .plan-content ol { padding-left: 1.2rem; margin: 0.4rem 0; }
    .plan-content li { margin: 0.25rem 0; }
    .plan-content p { margin: 0.4rem 0; }
    .plan-content strong { color: var(--accent); }
    .plan-content img { max-width: 100%; border-radius: 12px; margin: 0.8rem 0; box-shadow: var(--shadow); }
    .plan-content hr { border: none; border-top: 1px solid var(--border); margin: 1.2rem 0; }

    /* Star rating */
    .rating-widget {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 1rem 0;
      padding: 0.8rem;
      background: var(--bg);
      border-radius: 10px;
    }
    .rating-label { font-size: 0.8rem; color: var(--text-dim); margin-right: 0.3rem; }
    .stars { display: flex; gap: 0.15rem; }
    .star {
      font-size: 1.6rem;
      cursor: pointer;
      color: var(--star-empty);
      transition: color 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .star.filled { color: var(--star); }
    .star:hover { color: var(--star); }
    .rating-info { font-size: 0.75rem; color: var(--text-dim); margin-left: auto; }

    /* Shopping list checkboxes */
    .shopping-item {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid #f5f5f5;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .shopping-item:last-child { border-bottom: none; }
    .shopping-item.checked .shopping-text {
      text-decoration: line-through;
      color: var(--text-dim);
    }
    .shopping-check {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border: 2px solid #ccc;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      margin-top: 1px;
    }
    .shopping-item.checked .shopping-check {
      background: var(--success);
      border-color: var(--success);
    }
    .shopping-item.checked .shopping-check::after {
      content: '\2713';
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .shopping-text { font-size: 0.95rem; line-height: 1.4; padding-top: 2px; }
    .shopping-category { font-weight: 700; font-size: 0.9rem; color: #0f3460; margin-top: 1.2rem; margin-bottom: 0.3rem; }
    .shopping-progress {
      background: var(--surface);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      box-shadow: var(--shadow);
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--success);
      border-radius: 3px;
      transition: width 0.3s;
    }
    .progress-text { font-size: 0.8rem; color: var(--text-dim); white-space: nowrap; }
    .download-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.8rem;
    }

    /* Feedback */
    .feedback-section { padding: 0.5rem 0; }
    .feedback-entry {
      background: var(--bg);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
    }
    .feedback-author { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .feedback-text { font-size: 0.9rem; color: var(--text); line-height: 1.5; }
    .feedback-form { margin-top: 1.5rem; }
    .feedback-form textarea {
      width: 100%;
      min-height: 100px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem;
      font-family: inherit;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
    }
    .feedback-form textarea:focus { border-color: var(--accent); }
    .feedback-form .btn { margin-top: 0.6rem; }
    .feedback-hint {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.4rem;
      line-height: 1.4;
    }

    /* Running */
    .running-banner {
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 1rem;
      margin: 0.8rem;
      display: none;
      align-items: center;
      gap: 0.8rem;
    }
    .running-banner.active { display: flex; }
    .spinner { width: 20px; height: 20px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
    .empty-state h2 { color: var(--text); margin-bottom: 0.5rem; }
  </style>
</head>
<body>

  <!-- List View -->
  <div class="list-view" id="listView">
    <div class="header">
      <h1>Madplaner</h1>
      <div class="header-right">
        <span class="user-label" id="userLabel"></span>
        <button class="btn" id="btnGenerate" onclick="generate()">+ Ny</button>
      </div>
    </div>
    <div class="running-banner" id="runningBanner">
      <div class="spinner"></div>
      <span style="font-size:0.85rem;font-weight:500">Genererer madplan...</span>
    </div>
    <div id="planList"></div>
  </div>

  <!-- Detail View -->
  <div class="detail-view" id="detailView">
    <div class="header">
      <button class="btn back" onclick="showList()">&larr; Tilbage</button>
      <span id="detailTitle" style="font-weight:600;font-size:0.9rem"></span>
      <span class="user-label" id="userLabelDetail"></span>
    </div>
    <div class="tab-bar" id="tabBar"></div>
    <div class="plan-content" id="planContent"></div>
  </div>

  <script>
    let ws, plans = [], currentPlanId = null, currentSections = [], checkedItems = [];
    let currentRatings = {}, currentFeedback = {};
    let currentUser = '';

    const BASE = () => location.pathname.replace(/\/$/, '');

    // --- Init ---

    async function init() {
      await detectCurrentUser();
      connectWS();
      loadPlans();
      checkStatus();
    }

    async function detectCurrentUser() {
      // Method 1: HA external_auth (official way for ingress add-ons)
      try {
        const authToken = await getHAToken();
        if (authToken) {
          const res = await fetch(`${BASE()}/api/current-user`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
          });
          if (res.ok) {
            const data = await res.json();
            if (data.name) { currentUser = data.name; }
          }
        }
      } catch (e) {}

      // Method 2: Fallback without token
      if (!currentUser) {
        try {
          const res = await fetch(`${BASE()}/api/current-user`);
          if (res.ok) {
            const data = await res.json();
            if (data.name) currentUser = data.name;
          }
        } catch (e) {}
      }

      document.getElementById('userLabel').textContent = currentUser;
      document.getElementById('userLabelDetail').textContent = currentUser;
    }

    function getHAToken() {
      return new Promise((resolve) => {
        // HA ingress provides auth via postMessage to parent
        function handler(e) {
          if (e.data && e.data.type === 'auth/token') {
            window.removeEventListener('message', handler);
            resolve(e.data.access_token);
          }
        }
        window.addEventListener('message', handler);
        try {
          window.parent.postMessage({ type: 'auth/request' }, '*');
        } catch (err) { resolve(null); }
        // Timeout after 500ms
        setTimeout(() => { window.removeEventListener('message', handler); resolve(null); }, 500);
      });
    }

    // --- WebSocket ---

    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}${BASE()}/ws`);
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'started') showRunning(true);
        if (msg.type === 'completed') { showRunning(false); loadPlans(); }
      };
      ws.onclose = () => setTimeout(connectWS, 3000);
    }

    function showRunning(on) {
      document.getElementById('runningBanner').classList.toggle('active', on);
      document.getElementById('btnGenerate').disabled = on;
    }

    // --- Plans ---

    async function loadPlans() {
      const res = await fetch(`${BASE()}/api/madplaner`);
      plans = await res.json();
      renderList();
    }

    function renderList() {
      const el = document.getElementById('planList');
      if (!plans.length) {
        el.innerHTML = '<div class="empty-state"><h2>Ingen madplaner</h2><p>Tryk "+ Ny" for at generere.</p></div>';
        return;
      }
      el.innerHTML = plans.map(p => `
        <div class="plan-card" onclick="showPlan('${p.id}')">
          <div>
            <div class="plan-card-title">Uge ${p.week || '?'}, ${p.year || ''}</div>
            <div class="plan-card-meta">${fmtDate(p.createdAt)}</div>
          </div>
          <span class="plan-card-arrow">&rsaquo;</span>
        </div>`).join('');
    }

    async function showPlan(id) {
      currentPlanId = id;
      const [planRes, ratingsRes, feedbackRes] = await Promise.all([
        fetch(`${BASE()}/api/madplaner/${id}`),
        fetch(`${BASE()}/api/madplaner/${id}/ratings`),
        fetch(`${BASE()}/api/madplaner/${id}/feedback`),
      ]);
      const data = await planRes.json();
      currentRatings = await ratingsRes.json();
      currentFeedback = await feedbackRes.json();
      checkedItems = data.checked || [];

      document.getElementById('listView').classList.add('hidden');
      document.getElementById('detailView').classList.add('active');

      const plan = plans.find(p => p.id === id);
      document.getElementById('detailTitle').textContent = plan ? `Uge ${plan.week}` : '';

      const container = document.createElement('div');
      container.innerHTML = data.html;
      currentSections = parseSections(container);
      renderTabs();
      showSection(0);
    }

    function parseSections(container) {
      const sections = [];
      let current = { title: 'Overblik', content: '', isShoppingList: false, isFeedback: false, recipeName: '' };

      for (const node of container.childNodes) {
        if (node.tagName === 'H2' || (node.tagName === 'H1' && sections.length > 0)) {
          if (current.content || current.title !== 'Overblik') sections.push(current);
          const title = node.textContent.trim();
          const isShop = title.toLowerCase().includes('indkøb');
          const recipeName = extractRecipeName(title);
          current = { title, content: '', isShoppingList: isShop, isFeedback: false, recipeName };
        } else {
          current.content += node.outerHTML || '';
        }
      }
      if (current.content || current.title !== 'Overblik') sections.push(current);

      // Add feedback tab
      sections.push({ title: 'Feedback', content: '', isShoppingList: false, isFeedback: true, recipeName: '' });

      return sections;
    }

    function extractRecipeName(title) {
      const match = title.match(/^\w+dag:\s*(.+)$/i);
      return match ? match[1].trim() : '';
    }

    function renderTabs() {
      const bar = document.getElementById('tabBar');
      bar.innerHTML = currentSections.map((s, i) => {
        let label = s.title;
        if (label.includes('Mandag')) label = 'Man';
        else if (label.includes('Tirsdag')) label = 'Tir';
        else if (label.includes('Onsdag')) label = 'Ons';
        else if (label.includes('Torsdag')) label = 'Tor';
        else if (label.includes('Fredag')) label = 'Fre';
        else if (label.toLowerCase().includes('indkøb')) label = 'Indkøb';
        else if (label === 'Feedback') label = 'Feedback';
        else if (label.length > 10) label = label.slice(0, 10) + '…';
        return `<span class="tab ${i === 0 ? 'active' : ''}" onclick="showSection(${i})">${label}</span>`;
      }).join('');
    }

    let activeSection = 0;

    function showSection(idx) {
      activeSection = idx;
      const section = currentSections[idx];
      const el = document.getElementById('planContent');

      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));

      if (section.isFeedback) {
        el.innerHTML = renderFeedbackSection();
      } else if (section.isShoppingList) {
        el.innerHTML = renderShoppingList(section);
        updateProgress();
      } else {
        let html = `<h2>${section.title}</h2>${section.content}`;
        if (section.recipeName) {
          html += renderRatingWidget(section.recipeName);
        }
        el.innerHTML = html;
      }
      el.scrollTop = 0;
    }

    function refreshCurrentSection() {
      showSection(activeSection);
    }

    // --- Star Ratings ---

    function renderRatingWidget(recipeName) {
      const recipeRatings = currentRatings[recipeName] || {};
      const myRating = recipeRatings[currentUser] || 0;
      const allRatings = Object.values(recipeRatings);
      const avg = allRatings.length ? (allRatings.reduce((a, b) => a + b, 0) / allRatings.length).toFixed(1) : null;

      let starsHtml = '';
      for (let i = 1; i <= 5; i++) {
        const filled = i <= myRating ? 'filled' : '';
        starsHtml += `<span class="star ${filled}" onclick="rateRecipe('${escHtml(recipeName)}', ${i})">★</span>`;
      }

      const infoText = avg ? `${avg}/5 (${allRatings.length} vurd.)` : 'Ingen vurderinger endnu';

      return `
        <div class="rating-widget">
          <span class="rating-label">Din vurdering:</span>
          <div class="stars">${starsHtml}</div>
          <span class="rating-info">${infoText}</span>
        </div>`;
    }

    async function rateRecipe(recipeName, rating) {
      if (!currentUser) { alert('Kunne ikke finde din HA-bruger. Prøv at genindlæse siden.'); return; }
      await fetch(`${BASE()}/api/madplaner/${currentPlanId}/ratings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ recipe: recipeName, user: currentUser, rating }),
      });
      if (!currentRatings[recipeName]) currentRatings[recipeName] = {};
      currentRatings[recipeName][currentUser] = rating;
      refreshCurrentSection();
    }

    // --- Shopping List ---

    function renderShoppingList(section) {
      const tmp = document.createElement('div');
      tmp.innerHTML = section.content;

      let html = `<div class="download-row"><a href="${BASE()}/api/madplaner/${currentPlanId}/shopping-list.txt" class="btn small secondary" download>Download liste</a></div>`;
      html += '<div class="shopping-progress"><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><span class="progress-text" id="progressText">0/0</span></div>';

      let itemIndex = 0;
      for (const node of tmp.childNodes) {
        if (node.tagName === 'H3') {
          html += `<div class="shopping-category">${node.textContent}</div>`;
        } else if (node.tagName === 'UL') {
          for (const li of node.querySelectorAll('li')) {
            const isChecked = checkedItems.includes(itemIndex);
            html += `<div class="shopping-item ${isChecked ? 'checked' : ''}" onclick="toggleItem(${itemIndex}, this)">
              <div class="shopping-check"></div>
              <span class="shopping-text">${li.innerHTML}</span>
            </div>`;
            itemIndex++;
          }
        }
      }
      return html;
    }

    function toggleItem(index, el) {
      const isChecked = checkedItems.includes(index);
      if (isChecked) {
        checkedItems = checkedItems.filter(i => i !== index);
        el.classList.remove('checked');
      } else {
        checkedItems.push(index);
        el.classList.add('checked');
      }
      updateProgress();
      saveChecked();
    }

    function updateProgress() {
      const total = document.querySelectorAll('.shopping-item').length;
      const done = checkedItems.length;
      const fill = document.getElementById('progressFill');
      const text = document.getElementById('progressText');
      if (fill && text) {
        fill.style.width = total ? `${(done / total) * 100}%` : '0%';
        text.textContent = `${done}/${total}`;
      }
    }

    async function saveChecked() {
      await fetch(`${BASE()}/api/madplaner/${currentPlanId}/checked`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ checked: checkedItems }),
      });
    }

    // --- Feedback ---

    function renderFeedbackSection() {
      let html = '<div class="feedback-section">';
      html += '<h2>Feedback til denne madplan</h2>';
      html += '<p style="font-size:0.85rem;color:var(--text-dim);margin:0.5rem 0 1rem">Skriv hvad der fungerede godt og hvad der kan forbedres. Feedback bruges til at tilpasse fremtidige madplaner.</p>';

      // Show existing feedback from all users
      const entries = Object.entries(currentFeedback);
      if (entries.length) {
        for (const [user, text] of entries) {
          html += `<div class="feedback-entry">
            <div class="feedback-author">${escHtml(user)}</div>
            <div class="feedback-text">${escHtml(text)}</div>
          </div>`;
        }
      }

      // Form for current user
      const myFeedback = currentFeedback[currentUser] || '';
      html += `<div class="feedback-form">
        <strong style="font-size:0.85rem">${currentUser ? escHtml(currentUser) + 's feedback:' : 'Din feedback:'}</strong>
        <textarea id="feedbackText" placeholder="F.eks.: Tirsdagens ret var for krydret. Mere pasta-lignende retter. Bønneburgeren var fantastisk!">${escHtml(myFeedback)}</textarea>
        <button class="btn small" onclick="saveFeedback()">Gem feedback</button>
        <p class="feedback-hint">Feedback tages til indtægt inden for de eksisterende kostregler (ingen fisk, laktosefri, etc.)</p>
      </div>`;
      html += '</div>';
      return html;
    }

    async function saveFeedback() {
      if (!currentUser) { alert('Kunne ikke finde din HA-bruger. Prøv at genindlæse siden.'); return; }
      const text = document.getElementById('feedbackText').value.trim();
      await fetch(`${BASE()}/api/madplaner/${currentPlanId}/feedback`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: currentUser, text }),
      });
      currentFeedback[currentUser] = text;
      refreshCurrentSection();
    }

    // --- Navigation ---

    function showList() {
      document.getElementById('listView').classList.remove('hidden');
      document.getElementById('detailView').classList.remove('active');
      currentPlanId = null;
    }

    async function generate() {
      await fetch(`${BASE()}/api/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ skill: 'madplan', triggeredBy: 'manual' }),
      });
    }

    // --- Helpers ---

    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString('da-DK', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function escHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function checkStatus() {
      const res = await fetch(`${BASE()}/api/status`);
      const { running } = await res.json();
      showRunning(running);
    }

    init();
  </script>
</body>
</html>
